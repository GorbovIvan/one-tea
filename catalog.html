<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>Каталог — One Tea</title>
    <link rel="icon" href="logo.png" type="image/png">
</head>
<body id="catalog-page"> <!-- Добавил ID для специфичных стилей -->
    <nav class="menu">
        <a href="index.html">
            <img src="logo.png" class="logo-img" alt="Logo">
        </a>
        <h1 class="menu-title">One Tea</h1>
        <div class="nav-links">
            <a href="index.html" class="menu-btn">Главная</a>
            <a href="catalog.html" class="menu-btn">Каталог авторского чая</a>
            <a href="about.html" class="menu-btn">О нас</a>
            <a href="contact.html" class="menu-btn">Контакты</a>
            <a href="calc.html" class="menu-btn">Калькулятор чая</a>
        </div>
    </nav>

    <main class="content-block">
        <h4>Каталог авторского чая</h4>
        <div class="table-wrapper">
            <table class="tea-table">
                <thead>
                    <tr>
                        <th>Название</th>
                        <th>Оттенок</th>
                        <th>Время</th>
                        <th>Описание</th>
                        <th>Состав</th>
                        <th>Цена</th>
                        <th>Фото</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td data-label="Название">Лавандовый имбирь</td>
                        <td data-label="Оттенок">Травяной, пряный</td>
                        <td data-label="Время">7-10 мин</td>
                        <td data-label="Описание">Успокаивающий, травяной чай с ноткой имбирного тепла</td>
                        <td data-label="Состав">Чёрный с бергамотом, имбирь, лаванда</td>
                        <td data-label="Цена">150 руб</td>
                        <td data-label="Фото"><img src="images/лавандовый_имбирь.jpeg" class="catalog-img" alt="Чай"></td>
                    </tr>
                    <!-- Добавляй новые <tr> здесь -->
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
