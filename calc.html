<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>One Tea - Конструктор чая</title>
    <link rel="icon" href="logo.png" type="image/png">
    <style>
        .menu { position: sticky; top: 0; z-index: 1000; }
        .calc-wrapper { display: flex; flex-wrap: wrap; gap: 40px; justify-content: center; max-width: 1100px; margin: 20px auto; padding: 20px; }
        .calc-container { flex: 1; min-width: 350px; }
        .jar-container { flex: 0 0 250px; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1; }
        .tea-jar { width: 150px; height: 250px; border: 4px solid #eee; border-top: 10px solid #ddd; border-radius: 10px 10px 40px 40px; position: relative; background: rgba(255,255,255,0.1); overflow: hidden; display: flex; flex-direction: column-reverse; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .tea-layer { width: 100%; transition: height 0.3s ease; }
        .qty-input { width: 65px; padding: 8px; border-radius: 5px; border: 1px solid #73be5c; text-align: center; }
        .results-panel { margin-top: 20px; padding: 20px; background-color: #555; border: 3px solid #73be5c; border-radius: 10px; color: white; }
        .flavor-tag { display: inline-block; background: #73be5c; padding: 4px 10px; border-radius: 15px; margin: 3px; font-size: 13px; }
        .reset-btn { background-color: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 15px; }
        .limit-info { font-size: 11px; color: #888; display: block; }
        .total-val { color: #73be5c; font-weight: bold; }
        
        .tea-name-input {
            background: transparent;
            border: none;
            border-bottom: 1px dashed #ffd700;
            color: #ffd700;
            font-style: italic;
            font-size: 1.2em;
            width: 100%;
            margin-bottom: 15px;
            font-family: inherit;
            outline: none;
        }
        .tea-name-input::placeholder { color: rgba(255, 215, 0, 0.5); }
    </style>
</head>
<body>
    <nav class="menu">
        <a href="index.html"><img src="logo.png" class="logo-img" alt="Logo"></a>
        <h1 class="menu-title">One Tea</h1>
        <div class="nav-links">
            <a href="index.html" class="menu-btn">Главная</a>
            <a href="catalog.html" class="menu-btn">Каталог авторского чая</a>
            <a href="about.html" class="menu-btn">О нас</a>
            <a href="contact.html" class="menu-btn">Контакты</a>
            <a href="calc.html" class="menu-btn">Калькулятор чая</a>
        </div>
    </nav>

    <div class="calc-wrapper">
        <div class="calc-container">
            <h4>Конструктор авторского чая</h4>
            <p>Соберите свой микс (до 100г)</p>
            <table>
                <tbody id="ingredients-body"></tbody>
            </table>
            <div class="results-panel">
                <input type="text" id="tea-name" class="tea-name-input" placeholder="Назовите ваш купаж...">
                <p>Итоговая стоимость: <span id="total-price" class="total-val">0</span> ₽</p>
                <p>Время заварки: <span id="total-time" class="total-val">0</span> мин.</p>
                <div id="flavor-profile">Выберите ингредиенты...</div>
                <button class="reset-btn" onclick="resetCalculator()">Очистить всё</button>
            </div>
        </div>
        <div class="jar-container">
            <div class="tea-jar" id="visual-jar"></div>
            <p><b id="gram-counter">0</b> / 100 гр</p>
        </div>
    </div>

    <!-- Подключаем скомпилированный TypeScript -->
    <script src="dist/main.js"></script>
</body>
</html>
